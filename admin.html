<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ส่วนผู้ดูแลระบบ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="container">
            <div class="header-content">
                <h1>🔐 ส่วนผู้ดูแลระบบ</h1>
                <p class="subtitle">จัดการเรื่องร้องทุกข์อย่างมีประสิทธิภาพ</p>
            </div>
        </div>
    </header>

    <main class="container">
        <!-- Login Form -->
        <div id="loginSection" class="auth-section">
            <div class="login-box">
                <div class="login-header">
                    <h2>🔑 เข้าสู่ระบบ</h2>
                    <p class="login-subtitle">กรุณากรอกรหัสผ่านของคุณ</p>
                </div>
                
                <div id="loginMessage" class="alert hidden"></div>

                <div class="form-group">
                    <input 
                        type="password" 
                        id="adminPassword" 
                        placeholder="กรุณาใส่รหัสผ่าน"
                        autocomplete="off"
                    >
                </div>

                <button id="loginBtn" class="btn-submit">✓ เข้าสู่ระบบ</button>
            </div>
        </div>

        <!-- Admin Section -->
        <div id="adminSection" class="admin-section hidden">
            <div class="admin-header">
                <div class="admin-header-left">
                    <h2>📋 รายการเรื่องร้องทุกข์</h2>
                    <p class="admin-subtitle" id="complaintCount"></p>
                </div>
                <div class="admin-controls">
                    <div class="sort-wrapper">
                        <label for="sortOrder" class="sort-label">📊 เรียงลำดับ:</label>
                        <select id="sortOrder" class="sort-select" title="เลือกลำดับการแสดงผล">
                            <option value="newest">⬇️ ล่าสุดก่อน</option>
                            <option value="oldest">⬆️ เก่าสุดก่อน</option>
                        </select>
                    </div>
                    <button id="logoutBtn" class="btn-logout">🚪 ออกจากระบบ</button>
                </div>
            </div>

            <div class="table-wrapper">
                <table class="complaints-table" id="complaintTable">
                    <thead>
                        <tr>
                            <th>📅 วันที่ / เวลา</th>
                            <th>⏱️ ผ่านไปแล้ว</th>
                            <th>👤 ชื่อ</th>
                            <th>💬 รายละเอียด</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td colspan="4" class="loading">กำลังโหลด...</td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div class="admin-footer">
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Complaint Management System</p>
    </footer>

    <script src="admin.js"></script>
</body>
</html>
